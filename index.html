<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxímetro de Reunião</title>
<link href="https://fonts.googleapis.com/css2?family=Chivo+Mono:wght@400;500;700&family=Archivo:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#101216;
    --panel:#181B21;
    --panel-edge:#232830;
    --led:#FFB427;
    --led-dim:rgba(255,180,39,.14);
    --alert:#FF4B4B;
    --alert-dim:rgba(255,75,75,.16);
    --text:#E8E6E1;
    --muted:#8A8F98;
    --taxi:#F7C948;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Archivo',system-ui,sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 16px;
  }
  .app{width:100%;max-width:560px}

  /* faixa quadriculada de táxi */
  .checker{
    height:14px;
    border-radius:8px 8px 0 0;
    background:
      repeating-conic-gradient(#0c0d10 0% 25%, var(--taxi) 0% 50%) 0 0/14px 14px;
    opacity:.9;
  }

  .meter{
    background:linear-gradient(180deg,var(--panel),#14161b);
    border:1px solid var(--panel-edge);
    border-top:none;
    border-radius:0 0 var(--radius) var(--radius);
    padding:22px 22px 18px;
    box-shadow:0 20px 50px rgba(0,0,0,.45);
  }

  .meter-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
  }
  .brand{
    font-size:12px;
    font-weight:800;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--muted);
  }
  .flag{
    font-family:'Chivo Mono',monospace;
    font-size:12px;
    font-weight:700;
    letter-spacing:.14em;
    padding:6px 12px;
    border-radius:6px;
    border:1px solid var(--panel-edge);
    color:var(--muted);
    background:#111318;
    transition:all .3s;
  }
  .flag.t1{color:var(--led);border-color:rgba(255,180,39,.4);background:var(--led-dim)}
  .flag.t2{
    color:#fff;border-color:var(--alert);background:var(--alert-dim);
    animation:pulse 1s infinite;
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(255,75,75,.5)}
    50%{box-shadow:0 0 0 7px rgba(255,75,75,0)}
  }

  .display{
    background:#0B0C0F;
    border:1px solid var(--panel-edge);
    border-radius:10px;
    padding:22px 18px 16px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .display::after{ /* scanline sutil */
    content:"";
    position:absolute;inset:0;
    background:repeating-linear-gradient(0deg,transparent 0 3px,rgba(255,255,255,.015) 3px 4px);
    pointer-events:none;
  }
  .cost{
    font-family:'Chivo Mono',monospace;
    font-size:clamp(44px,11vw,64px);
    font-weight:700;
    color:var(--led);
    text-shadow:0 0 22px rgba(255,180,39,.35);
    letter-spacing:.02em;
    transition:color .4s,text-shadow .4s;
    font-variant-numeric:tabular-nums;
  }
  .display.over .cost{
    color:var(--alert);
    text-shadow:0 0 22px rgba(255,75,75,.45);
  }
  .cost-label{
    font-size:11px;
    letter-spacing:.24em;
    text-transform:uppercase;
    color:var(--muted);
    margin-top:6px;
  }

  .subdisplays{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    margin-top:14px;
  }
  .sub{
    background:#0B0C0F;
    border:1px solid var(--panel-edge);
    border-radius:8px;
    padding:10px 8px;
    text-align:center;
  }
  .sub b{
    display:block;
    font-family:'Chivo Mono',monospace;
    font-size:17px;
    font-weight:500;
    color:var(--text);
    font-variant-numeric:tabular-nums;
  }
  .sub span{
    font-size:10px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--muted);
  }
  .sub.warn b{color:var(--alert)}

  .controls{
    display:flex;
    gap:10px;
    margin-top:16px;
  }
  button{
    font-family:'Archivo',sans-serif;
    font-weight:800;
    font-size:14px;
    letter-spacing:.08em;
    text-transform:uppercase;
    border:none;
    border-radius:9px;
    padding:14px 0;
    cursor:pointer;
    transition:transform .08s,filter .2s;
  }
  button:active{transform:translateY(1px)}
  .btn-main{flex:2;background:var(--taxi);color:#141310}
  .btn-main.running{background:var(--alert);color:#fff}
  .btn-reset{flex:1;background:#22262e;color:var(--muted);border:1px solid var(--panel-edge)}
  .btn-main:hover{filter:brightness(1.08)}
  .btn-reset:hover{color:var(--text)}
  button:focus-visible{outline:2px solid var(--taxi);outline-offset:2px}

  /* configuração */
  .config{
    margin-top:18px;
    background:var(--panel);
    border:1px solid var(--panel-edge);
    border-radius:var(--radius);
    padding:18px 20px 20px;
    transition:opacity .3s;
  }
  .config.locked{opacity:.45;pointer-events:none}
  .config h2{
    font-size:12px;
    font-weight:800;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:14px;
  }
  .fields{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .field label{
    display:block;
    font-size:11px;
    letter-spacing:.06em;
    color:var(--muted);
    margin-bottom:5px;
  }
  .field input{
    width:100%;
    background:#0E1013;
    border:1px solid var(--panel-edge);
    border-radius:8px;
    color:var(--text);
    font-family:'Chivo Mono',monospace;
    font-size:16px;
    padding:10px 12px;
  }
  .field input:focus{outline:none;border-color:var(--taxi)}
  .hint{
    margin-top:12px;
    font-size:12.5px;
    color:var(--muted);
    line-height:1.5;
  }
  .hint b{color:var(--led);font-weight:600}
  .hint .h2{color:var(--alert);font-weight:600}

  @media(max-width:430px){
    .fields{grid-template-columns:1fr}
    .subdisplays{grid-template-columns:1fr 1fr 1fr;gap:6px}
  }
  @media (prefers-reduced-motion:reduce){
    .flag.t2{animation:none}
  }
</style>
</head>
<body>
<div class="app">
  <div class="checker"></div>
  <div class="meter">
    <div class="meter-top">
      <div class="brand">Taxímetro · Reunião</div>
      <div class="flag" id="flag">LIVRE</div>
    </div>

    <div class="display" id="display">
      <div class="cost" id="cost">R$ 0,00</div>
      <div class="cost-label">Custo acumulado</div>
    </div>

    <div class="subdisplays">
      <div class="sub"><b id="elapsed">00:00:00</b><span>Decorrido</span></div>
      <div class="sub" id="subRemaining"><b id="remaining">--:--</b><span>Restante</span></div>
      <div class="sub"><b id="rate">R$ 0,00</b><span>Por minuto</span></div>
    </div>

    <div class="controls">
      <button class="btn-main" id="btnMain">▶ Iniciar corrida</button>
      <button class="btn-reset" id="btnReset">Zerar</button>
    </div>
  </div>

  <div class="config" id="config">
    <h2>Configuração da tarifa</h2>
    <div class="fields">
      <div class="field">
        <label for="inValor">Valor (R$)</label>
        <input type="number" id="inValor" value="100" min="0" step="0.01">
      </div>
      <div class="field">
        <label for="inTempo">…a cada (minutos)</label>
        <input type="number" id="inTempo" value="60" min="1" step="1">
      </div>
      <div class="field">
        <label for="inLimite">Duração prevista (min)</label>
        <input type="number" id="inLimite" value="30" min="1" step="1">
      </div>
      <div class="field">
        <label for="inMulti">Multiplicador se estourar</label>
        <input type="number" id="inMulti" value="2" min="1" step="0.1">
      </div>
    </div>
    <div class="hint" id="hint"></div>
  </div>
</div>

<script>
(function(){
  const $ = id => document.getElementById(id);
  const fmtBRL = v => v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
  const pad = n => String(n).padStart(2,'0');

  let running = false;
  let elapsedMs = 0;      // acumulado em pausas
  let startTs = null;     // timestamp do último start
  let timer = null;

  const cfg = { valor:100, tempoMin:60, limiteMin:30, multi:2 };

  function readConfig(){
    cfg.valor    = Math.max(0, parseFloat($('inValor').value)  || 0);
    cfg.tempoMin = Math.max(1, parseFloat($('inTempo').value)  || 1);
    cfg.limiteMin= Math.max(1, parseFloat($('inLimite').value) || 1);
    cfg.multi    = Math.max(1, parseFloat($('inMulti').value)  || 1);
    updateHint();
    render();
  }

  function ratePerMin(){ return cfg.valor / cfg.tempoMin; }

  function totalElapsed(){
    return elapsedMs + (running ? Date.now() - startTs : 0);
  }

  function costFor(ms){
    const min = ms/60000;
    const r1 = ratePerMin();
    if(min <= cfg.limiteMin) return min * r1;
    return cfg.limiteMin * r1 + (min - cfg.limiteMin) * r1 * cfg.multi;
  }

  function fmtHMS(ms){
    const s = Math.floor(ms/1000);
    return pad(Math.floor(s/3600))+':'+pad(Math.floor(s/60)%60)+':'+pad(s%60);
  }
  function fmtMS(ms){
    const s = Math.max(0, Math.floor(ms/1000));
    return pad(Math.floor(s/60))+':'+pad(s%60);
  }

  function updateHint(){
    const r1 = ratePerMin();
    $('hint').innerHTML =
      'Tarifa 1: <b>'+fmtBRL(r1)+'/min</b> até '+cfg.limiteMin+' min. '+
      'Depois disso, Tarifa 2: <span class="h2">'+fmtBRL(r1*cfg.multi)+'/min</span>.';
  }

  function render(){
    const ms = totalElapsed();
    const over = ms/60000 > cfg.limiteMin;
    const started = ms > 0 || running;

    $('cost').textContent = fmtBRL(costFor(ms));
    $('elapsed').textContent = fmtHMS(ms);
    $('rate').textContent = fmtBRL(ratePerMin() * (over ? cfg.multi : 1));

    const remMs = cfg.limiteMin*60000 - ms;
    if(over){
      $('remaining').textContent = '+'+fmtMS(-remMs);
      $('subRemaining').classList.add('warn');
    }else{
      $('remaining').textContent = fmtMS(remMs);
      $('subRemaining').classList.remove('warn');
    }

    $('display').classList.toggle('over', over);

    const flag = $('flag');
    flag.className = 'flag' + (started ? (over ? ' t2' : ' t1') : '');
    flag.textContent = started ? (over ? 'TARIFA 2' : 'TARIFA 1') : 'LIVRE';

    document.title = started
      ? fmtBRL(costFor(ms)) + ' · Taxímetro de Reunião'
      : 'Taxímetro de Reunião';
  }

  function start(){
    readConfig();
    running = true;
    startTs = Date.now();
    timer = setInterval(render, 200);
    $('btnMain').textContent = '⏸ Pausar';
    $('btnMain').classList.add('running');
    $('config').classList.add('locked');
    render();
  }

  function pause(){
    elapsedMs = totalElapsed();
    running = false;
    clearInterval(timer);
    $('btnMain').textContent = '▶ Retomar';
    $('btnMain').classList.remove('running');
    $('config').classList.remove('locked');
    render();
  }

  function reset(){
    if(running) pause();
    elapsedMs = 0;
    $('btnMain').textContent = '▶ Iniciar corrida';
    render();
  }

  $('btnMain').addEventListener('click', () => running ? pause() : start());
  $('btnReset').addEventListener('click', reset);
  ['inValor','inTempo','inLimite','inMulti'].forEach(id =>
    $(id).addEventListener('input', readConfig)
  );

  readConfig();
})();
</script>
</body>
</html>
